name: Visual Regression

# Runs as a separate job on every PR so visual failures are clearly isolated
# from functional test failures.
#
# When tests fail, a bot comment is posted on the PR explaining why and
# telling the author to comment `/update-snapshots` to regenerate baselines.

on:
  workflow_call:
    inputs:
      artifact-name:
        description: "Name for the uploaded Playwright diff report artifact"
        type: string
        required: true

jobs:
  visual:
    name: Visual regression
    runs-on: ubuntu-latest

    env:
      ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
      VITE_API_BASE_URL: http://localhost:3022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Install Playwright Chromium browser
        run: npx playwright install chromium --with-deps

      - name: Apply database migrations and seed
        run: npm run db:deploy && npm run db:seed

      - name: Start API server in background
        run: npm run start:service &

      - name: Start frontend in background
        run: npm run dev:client &

      - name: Wait for API to be ready
        run: npx wait-on tcp:localhost:3022 --timeout 30000

      - name: Wait for frontend to be ready
        run: npx wait-on tcp:localhost:3000 --timeout 30000

      - name: Run visual regression tests
        id: visual
        run: npx playwright test --project=visual
        continue-on-error: true

      - name: Post failure comment on PR
        if: steps.visual.outcome == 'failure' && github.event.pull_request.number != ''
        uses: actions/github-script@v7
        with:
          script: |
            const artifact = '${{ inputs.artifact-name }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '## 📸 Visual regression failed',
                '',
                'Screenshots have changed or no Linux baseline exists for this branch yet.',
                '',
                '**If the UI change is intentional**, comment on this PR:',
                '```',
                '/update-snapshots',
                '```',
                'The bot will generate new baselines and commit them to your branch. Then re-run this check.',
                '',
                `**If it's a regression**, download the \`${artifact}\` artifact to see side-by-side diffs and fix the code.`,
              ].join('\n'),
            });

      - name: Fail the job
        if: steps.visual.outcome == 'failure'
        run: exit 1

      - name: Upload visual diff report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ inputs.artifact-name }}
          path: playwright-report/
          retention-days: 7
