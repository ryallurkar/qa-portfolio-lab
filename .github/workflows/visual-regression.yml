name: Visual Regression

on:
  workflow_call:
    inputs:
      artifact-name:
        type: string
        required: true

jobs:
  visual:
    name: Visual regression
    runs-on: ubuntu-latest

    env:
      ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
      VITE_API_BASE_URL: http://localhost:3022

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        env:
          NODE_ENV: development
      - run: npx playwright install chromium --with-deps
      - run: npm run db:deploy && npm run db:seed
      - run: npm run start:service &
      - run: npm run dev:client &
      - run: npx wait-on tcp:localhost:3022 --timeout 30000
      - run: npx wait-on tcp:localhost:3000 --timeout 30000

      - name: Run visual regression tests
        id: visual
        run: npx playwright test --project=visual
        continue-on-error: true

      - name: Post failure comment — instruct to comment /update-snapshots
        if: steps.visual.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '## 📸 Visual regression failed',
                '',
                'Screenshots have changed or no Linux baseline exists yet.',
                '',
                '**If the UI change is intentional**, comment on this PR:',
                '```',
                '/update-snapshots',
                '```',
                'The bot will detect your branch automatically, generate new baselines, and commit them.',
                'Then re-run this check.',
                '',
                '**If it is a regression:** download the `visual-diff-report` artifact to see diffs.',
              ].join('\n'),
            });

      - name: Fail the job
        if: steps.visual.outcome == 'failure'
        run: exit 1

      - name: Upload visual diff report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ inputs.artifact-name }}
          path: playwright-report/
          retention-days: 7
