name: Update Visual Snapshots

# APPROACH 3 — PR comment trigger
#
# Comment `/update-snapshots` on a PR to trigger this workflow.
# The branch is detected automatically from the PR — no manual input needed.

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch (fallback — use PR comment trigger instead)"
        required: true
        default: main

jobs:
  update:
    name: Regenerate Linux baselines
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '/update-snapshots'))

    env:
      ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
      VITE_API_BASE_URL: http://localhost:3022

    steps:
      - name: Resolve branch
        id: resolve
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('branch', context.payload.inputs.branch);
              return;
            }
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('branch', pr.data.head.ref);

      - name: React with 👀
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        env:
          NODE_ENV: development

      - run: npx playwright install chromium --with-deps
      - run: npm run db:deploy && npm run db:seed
      - run: npm run start:service &
      - run: npm run dev:client &
      - run: npx wait-on tcp:localhost:3022 --timeout 30000
      - run: npx wait-on tcp:localhost:3000 --timeout 30000

      - name: Generate Linux baselines
        run: npx playwright test --project=visual --update-snapshots all

      - name: Commit and push updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/visual-regression.visual.spec.ts-snapshots/
          git diff --staged --quiet \
            && echo "Baselines unchanged." \
            || (git commit -m "chore: update visual regression baselines [skip ci]" \
                && git push origin ${{ steps.resolve.outputs.branch }})

      - name: Post completion comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ Visual snapshots updated. Re-run the **PR Check** to confirm.',
            });
