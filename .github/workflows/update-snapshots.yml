name: Update Visual Snapshots

# APPROACH 2 — Manual workflow_dispatch
#
# Triggered manually from the Actions tab. The failure comment in the PR
# includes a direct link so the author lands on this page with one click.
# They still need to enter their branch name and click Run workflow.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to update snapshots on (your PR branch)"
        required: true
        default: main

jobs:
  update:
    name: Regenerate Linux baselines
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      ACCESS_TOKEN_SECRET: ${{ secrets.ACCESS_TOKEN_SECRET }}
      VITE_API_BASE_URL: http://localhost:3022

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        env:
          NODE_ENV: development

      - run: npx playwright install chromium --with-deps
      - run: npm run db:deploy && npm run db:seed
      - run: npm run start:service &
      - run: npm run dev:client &
      - run: npx wait-on tcp:localhost:3022 --timeout 30000
      - run: npx wait-on tcp:localhost:3000 --timeout 30000

      - name: Generate Linux baselines
        run: npx playwright test --project=visual --update-snapshots all

      - name: Commit and push updated baselines
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/e2e/visual-regression.visual.spec.ts-snapshots/
          git diff --staged --quiet \
            && echo "Baselines unchanged." \
            || (git commit -m "chore: update visual regression baselines [skip ci]" \
                && git push origin ${{ inputs.branch }})
