name: PR Check

# APPROACH 2 — workflow_dispatch with direct link
#
# Visual regression runs as a separate job. On failure, a bot comment posts
# a direct link to the "Update Visual Snapshots" workflow page.
# The author clicks the link, enters their branch name, and runs it manually.
#
# Tradeoff:
#   ✅ Explicit human decision required
#   ✅ No deployment noise in the PR
#   ❌ Author must navigate away from PR and type their branch name

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    name: E2E + API tests
    uses: ./.github/workflows/run-tests.yml
    with:
      test-command: npm run test:e2e
      artifact-name: test-report
    secrets: inherit

  visual:
    name: Visual regression
    uses: ./.github/workflows/visual-regression.yml
    with:
      artifact-name: visual-diff-report
    secrets: inherit
