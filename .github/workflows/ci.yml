name: PR Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    name: E2E + API tests
    uses: ./.github/workflows/run-tests.yml
    with:
      test-command: npm run test:e2e
      artifact-name: test-report
    secrets: inherit

  visual:
    name: Visual regression
    uses: ./.github/workflows/visual-regression.yml
    with:
      artifact-name: visual-diff-report
    secrets: inherit
