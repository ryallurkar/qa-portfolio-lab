name: PR Check

# APPROACH 3 — PR comment trigger
#
# Visual regression runs as a separate job. On failure, a bot comment
# tells the author to comment `/update-snapshots` on the PR.
# The update-snapshots workflow listens for that comment, detects the branch
# automatically, and commits new baselines back.
#
# Tradeoff:
#   ✅ No navigation away from the PR
#   ✅ Branch detected automatically — no manual input
#   ❌ Adds a comment to the PR timeline
#   ❌ Comment trigger is not discoverable without reading the bot message

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    name: E2E + API tests
    uses: ./.github/workflows/run-tests.yml
    with:
      test-command: npm run test:e2e
      artifact-name: test-report
    secrets: inherit

  visual:
    name: Visual regression
    uses: ./.github/workflows/visual-regression.yml
    with:
      artifact-name: visual-diff-report
    secrets: inherit
