name: PR Check

# APPROACH 1 — Auto-commit
#
# Visual tests run as part of the normal E2E job via run-tests.yml.
# If a Linux baseline is missing it is generated and committed automatically.
# No human approval — any UI change silently becomes the new baseline.
#
# Tradeoff:
#   ✅ Zero friction — nothing for the author to do
#   ❌ Regressions can slip through undetected (baseline updates without review)
#   ❌ Noisy commit history from bot baseline commits

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    name: E2E + Visual + API tests
    uses: ./.github/workflows/run-tests.yml
    with:
      test-command: npm test
      artifact-name: test-report
    secrets: inherit
